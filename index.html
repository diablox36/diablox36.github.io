<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PIXELS FIGHTING</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js"></script>
</head>

<body onload="setup()" class="vsc-initialized">
    <div class="canvas-container">
        <canvas id="canvas"></canvas>
    </div>
    <div class="controls-container">
        <div>
            <span class="title-text">PIXELS FIGHTING</span>
        </div>
        <div class="controls-grid">
            <label for="size-input">Size:</label>
            <input type="number" id="size-input" value="500" min="1" step="1" onchange="setup()">

            <label for="step-input">Step:</label>
            <input type="number" id="step-input" value="4" min="1" step="1" onchange="setup()">

            <label for="speed-input">Speed:</label>
            <input type="number" id="speed-input" value="2" min="1" step="1" onchange="setup()">
        </div>
    </div>
</body>

</html>
