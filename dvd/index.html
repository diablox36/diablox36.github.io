<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DVD Screensaver</title>
    <link rel="stylesheet" href="../homeStyles.css">
    <script src="dvdScript.js"></script>
</head>

<body onload="init()">
    <div class="controls-container">
        <div class="controls-grid">
            <label for="image-input">Upload Image:</label>
            <input type="file" id="image-input" accept="image/*" onchange="loadImage(event)" style="color: white;">
        </div>
    </div>
    <canvas id="canvas"></canvas>
</body>

</html>
